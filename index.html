<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林间的邱天</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --forest-bg: #1c2b23; /* 深邃的森林绿背景 */
            --forest-dark: #3C7D22; /* 墨绿色大字体修正 */
            --forest-text: #8da399; /* 时间、次要文字的灰绿色 */
            --autumn-gold: #ffb347; /* 饱满的金黄色 */
            --autumn-glow: rgba(255, 179, 71, 0.4); /* 金色微光 */
            --card-bg: rgba(255, 255, 255, 0.05); /* 半透明卡片底色 */
            --card-border: rgba(255, 255, 255, 0.1); /* 卡片边框色 */
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); /* 卡片阴影 */
        }

        body {
            margin: 0; background-color: var(--forest-bg); color: white;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 40px 20px;
            overflow-x: hidden; /* 防止爱心飘出 */
        }

        /* 黄金爱心飘落容器 */
        #heart-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        /* 完美的金黄色、大幅放大的爱心样式 */
        .heart {
            position: absolute;
            user-select: none;
            animation: heartFall linear infinite;
            /* 金黄色、饱满的视觉效果 */
            fill: var(--autumn-gold); /* 用于 SVG 的上色 */
            filter: drop-shadow(0 0 8px var(--autumn-glow)); /* 金色微光，增强氛围感 */
        }

        /* 标题区：绝对居中对齐 */
        header {
            text-align: center; margin-bottom: 6vh; margin-top: 5vh; z-index: 1;
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }

        /* 墨绿色大字体修正：大一点，但小于邱天的2.2rem */
        .forest-text { 
            font-size: 1.6rem; 
            color: var(--forest-dark); /* 完美的墨绿色 */
            letter-spacing: 2px; margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* 主标题 */
        .autumn-text { 
            font-size: 2.2rem; color: var(--autumn-gold); font-weight: bold; 
            letter-spacing: 4px; text-shadow: 0 0 15px var(--autumn-glow);
            padding-left: 10px; /* 补偿标点符号造成的视觉重心偏右 */
        }

        /* 输入区美化 */
        .input-section {
            width: 100%; max-width: 500px; background: var(--card-bg);
            padding: 25px; border-radius: 20px; margin-bottom: 40px;
            border: 1px solid var(--card-border); z-index: 1;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
        }

        textarea {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 1.1rem; resize: none; outline: none; height: 80px; margin-bottom: 15px;
        }

        .controls { display: flex; justify-content: space-between; align-items: center; }
        .author-input {
            background: rgba(255,255,255,0.05); border: 1px solid #333; color: #ccc;
            border-radius: 12px; padding: 6px 15px; width: 90px; outline: none;
        }

        /* 发布按钮 */
        button#publishBtn {
            background: var(--autumn-gold); border: none; padding: 10px 25px;
            border-radius: 25px; cursor: pointer; font-weight: bold; color: #1c2b23;
            transition: all 0.3s; box-shadow: 0 4px 15px var(--autumn-glow);
        }
        button#publishBtn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button#publishBtn:active { transform: translateY(1px); }

        /* 日记卡片美化 */
        #diary-list { width: 100%; max-width: 500px; z-index: 1; }
        .diary-item {
            background: var(--card-bg); padding: 20px; border-radius: 18px;
            margin-bottom: 20px; border: 1px solid var(--card-border);
            border-left: 5px solid var(--autumn-gold); backdrop-filter: blur(5px);
            position: relative; animation: slideIn 0.5s ease-out;
            transition: all 0.3s;
        }

        /* 删除闪现动效 */
        .flash-delete {
            animation: flash 0.3s ease-in-out 2;
            border-color: #ff4d4d !important;
        }

        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; background: rgba(255, 77, 77, 0.2); }
        }

        .diary-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .diary-time { font-size: 0.8rem; color: var(--forest-text); }
        .author-tag { color: var(--autumn-gold); font-weight: bold; margin-right: 10px; }
        .diary-content { line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; }

        /* 动作按钮 (金色的图标) */
        .actions { display: flex; gap: 12px; }
        .action-btn { background: none; border: none; cursor: pointer; padding: 4px; color: var(--forest-text); }
        .action-btn:hover { color: var(--autumn-gold); }
        .action-btn svg { width: 18px; height: 18px; }

        /* 自定义沉浸式毛玻璃确认模态框 */
        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); /* 全景毛玻璃背景 */
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--forest-bg); border: 1px solid var(--autumn-gold); /* 金色边框 */
            padding: 30px; border-radius: 20px; text-align: center;
            width: 80%; max-width: 320px; box-shadow: 0 0 30px var(--autumn-glow);
        }
        .modal-btns { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .modal-btn { padding: 8px 25px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; }
        .confirm-btn { background: var(--autumn-gold); color: var(--forest-bg); }
        .cancel-btn { background: transparent; color: var(--forest-text); border: 1px solid var(--forest-text); }

        /* 爱心飘落动画：下落、摆动和旋转 */
        @keyframes heartFall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
            15% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.1); opacity: 0; }
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <header>
        <div class="forest-text">虽然森林很大，有时候容易迷路</div>
        <div class="autumn-text">但秋天总会如约而至。</div>
    </header>

    <div class="input-section">
        <textarea id="diaryInput" placeholder="写给林间/邱天的话..."></textarea>
        <div class="controls">
            <input type="text" id="authorName" class="author-input" value="林间">
            <button id="publishBtn" onclick="publishEntry()">发布日志</button>
        </div>
    </div>

    <div id="diary-list"></div>

    <div id="customModal">
        <div class="modal-content">
            <p style="font-size: 1.1rem; margin: 0;">要把这段林间记忆抹去吗？</p >
            <div class="modal-btns">
                <button class="modal-btn cancel-btn" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm-btn" id="modalConfirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        // --- 已经填好的 Supabase 信息，不要修改 ---
        const SUPABASE_URL = 'https://hhsonthokjwhpcgbpnru.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhoc29udGhva2p3aHBjZ2JwbnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTUwNjQsImV4cCI6MjA5MTgzMTA2NH0.bf96o-eDXFSrOeHqTmnNSQZqDIDG7cjq1zciX7PNDQc';
        // ------------------------------------------

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let editingId = null;
        let deleteTargetId = null; // 用于存储待删除的ID

        // 编辑和删除的 SVG 图标 (金色的图标)
        const EDIT_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
        const TRASH_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

        // 完美定义爱心 SVG 路径 (由饱满的Unicode爱心生成)
        const HEART_ICON_PATH = "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z";

        // 获取初始数据
        async function fetchDiaries() {
            const { data } = await supabaseClient.from('ForestLog').select('*').order('created_at', { ascending: false });
            if (data) render(data);
        }

        function render(data) {
            document.getElementById('diary-list').innerHTML = data.map(item => `
                <div class="diary-item" id="item-${item.id}">
                    <div class="diary-header">
                        <div class="diary-time"><span class="author-tag">${item.author}</span>${new Date(item.created_at).toLocaleString()}</div>
                        <div class="actions">
                            <button class="action-btn" onclick="startEdit('${item.id}', \`${item.content}\`)">${EDIT_ICON}</button>
                            <button class="action-btn" onclick="openDeleteModal('${item.id}')">${TRASH_ICON}</button>
                        </div>
                    </div>
                    <div class="diary-content">${item.content}</div>
                </div>
            `).join('');
        }

        // 发布逻辑：彻底零延迟，极速发布
        async function publishEntry() {
            const content = document.getElementById('diaryInput').value.trim();
            const author = document.getElementById('authorName').value;
            if (!content) return;

            // 徹底零延迟：直接存入，直接显示
            if (editingId) {
                await supabaseClient.from('ForestLog').update({ content, author }).eq('id', editingId);
                editingId = null;
                document.getElementById('publishBtn').innerText = '发布日志';
            } else {
                await supabaseClient.from('ForestLog').insert([{ content, author }]);
            }
            document.getElementById('diaryInput').value = '';
            fetchDiaries();
        }

        function startEdit(id, content) {
            editingId = id;
            document.getElementById('diaryInput').value = content;
            document.getElementById('publishBtn').innerText = '保存修改';
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 平滑滚动到顶部输入框
        }

        // 自定义弹窗逻辑
        function openDeleteModal(id) {
            deleteTargetId = id; // 存入ID
            document.getElementById('customModal').style.display = 'flex'; // 显示毛玻璃模态框
            // 绑定确定按钮的点击事件
            document.getElementById('modalConfirmBtn').onclick = executeDelete;
        }

        function closeModal() {
            document.getElementById('customModal').style.display = 'none'; // 隐藏模态框
        }

        async function executeDelete() {
            const id = deleteTargetId;
            const element = document.getElementById(`item-${id}`);
            closeModal(); // 确定后先隐藏弹窗，体验更流畅
            
            // 触发删除闪现动画
            element.classList.add('flash-delete');
            
            setTimeout(async () => {
                await supabaseClient.from('ForestLog').delete().eq('id', id);
                fetchDiaries();
            }, 600); // 动画持续时间
        }

        // 6. 大号、饱满、金黄色爱心动画实现
        function createHeart() {
            const heartContainer = document.getElementById('heart-container');
            const heart = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            heart.setAttribute("viewBox", "0 0 24 24");
            heart.setAttribute("class", "heart");
            
            // 完美定义 SVG 路径：确保它看起来就是一个完整的图标枫叶，并通过 CSS fill 上色
            heart.innerHTML = `<path d="${HEART_ICON_PATH}" fill="var(--autumn-gold)" stroke="none" />`;
            
            // --- 大幅度调整大小：基础 30px + 随机 20px (范围：30px-50px) ---
            const size = Math.random() * 20 + 30 + 'px';
            heart.style.width = size;
            heart.style.height = size; 
            
            // 其他属性
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 7) + "s"; // 7s - 12s 下落
            heart.style.animationDelay = (Math.random() * 2) + "s";
            heart.style.opacity = Math.random() * 0.4 + 0.3; // Make them slightly transparent to blend

            heartContainer.appendChild(heart);
            
            // 动画结束后移除元素，防止堆积
            setTimeout(() => {
                heart.remove();
            }, (parseFloat(heart.style.animationDuration) + parseFloat(heart.style.animationDelay)) * 1000);
        }

        // 页面加载后立即生成几片，然后每隔一段时间生成新的 (增加密度)
        for(let i=0; i<8; i++) { setTimeout(createHeart, i * 200); }
        setInterval(createHeart, 500); // 生成间隔，保持饱满但不杂乱

        // 实时监听
        supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'ForestLog' }, fetchDiaries).subscribe();

        fetchDiaries();
    </script>
</body>
</html>
