<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林间的邱天</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --forest-bg: #1c2b23;
            --forest-dark: #8ED973; /* 你的专属嫩绿色 */
            --forest-text: #8da399;
            --autumn-gold: #ffb347;
            --love-pink: #ff85a1;
            --tired-blue: #70a1ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; background-color: var(--forest-bg); color: white;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 40px 20px; overflow-x: hidden;
        }

        /* 音乐开关样式 */
        #musicToggle {
            position: fixed; top: 20px; right: 20px; z-index: 1100;
            cursor: pointer; font-size: 1.8rem; opacity: 0.7; transition: 0.3s;
            user-select: none; filter: drop-shadow(0 0 5px var(--autumn-gold));
        }
        #musicToggle.playing { animation: rotate 4s linear infinite; opacity: 1; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 暗号与背景 */
        #passcodeOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--forest-bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s; }
        #heart-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; filter: drop-shadow(0 0 8px rgba(255,179,71,0.4)); animation: fall linear infinite; }

        header { text-align: center; margin-bottom: 5vh; z-index: 1; }
        .forest-text { font-size: 1.8rem; color: var(--forest-dark); font-weight: bold; margin-bottom: 10px; }
        .autumn-text { font-size: 2.3rem; color: var(--autumn-gold); font-weight: bold; }

        /* 输入区 */
        .input-section {
            width: 100%; max-width: 500px; background: var(--card-bg);
            padding: 25px; border-radius: 20px; margin-bottom: 30px;
            border: 1px solid var(--card-border); z-index: 1;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; resize: none; outline: none; height: 70px; }
        
        .mood-selector { display: flex; gap: 12px; margin: 15px 0; }
        .mood-btn { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .mood-btn.active { border-color: white; transform: scale(1.2); box-shadow: 0 0 10px white; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .author-input { background: rgba(255,255,255,0.08); border: 1px solid #444; color: #eee; border-radius: 12px; padding: 6px 12px; width: 80px; outline: none; }
        
        button#publishBtn {
            background: var(--autumn-gold); border: none; padding: 10px 22px;
            border-radius: 25px; cursor: pointer; font-weight: bold; color: #1c2b23;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(255,179,71,0.3);
        }

        /* 列表展示 */
        #diary-list { width: 100%; max-width: 500px; z-index: 1; }
        .diary-item {
            background: var(--card-bg); padding: 20px; border-radius: 18px;
            margin-bottom: 20px; border: 1px solid var(--card-border);
            backdrop-filter: blur(5px); position: relative;
        }
        .diary-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .diary-time { font-size: 0.8rem; color: var(--forest-text); }
        .author-tag { color: var(--autumn-gold); font-weight: bold; margin-right: 8px; }
        .actions { display: flex; gap: 15px; }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--forest-text); opacity: 0.6; }
        .action-btn:hover { color: var(--autumn-gold); opacity: 1; }

        /* 弹窗样式 */
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--forest-bg); border: 1px solid var(--autumn-gold); padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 320px; }
        .modal-btns { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .forest-text { font-size: 1.2rem; }
            .autumn-text { font-size: 1.6rem; }
            .input-section, #diary-list { width: 92%; padding: 15px; }
            #musicToggle { top: 15px; right: 15px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="musicToggle" onclick="toggleMusic()">🎵</div>
    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <div id="passcodeOverlay">
        <input type="password" id="passInput" placeholder="输入暗号..." style="background:transparent; border:none; border-bottom:1px solid #ffb347; color:white; text-align:center; outline:none; font-size:1.2rem;" oninput="checkPass(this.value)">
    </div>

    <div id="heart-container"></div>

    <header>
        <div class="forest-text">虽然森林很大 有时候容易迷路</div>
        <div class="autumn-text">但秋天总会如约而至</div>
    </header>

    <div class="input-section">
        <textarea id="diaryInput" placeholder="在这里留下此时此刻..."></textarea>
        
        <div class="mood-selector">
            <div class="mood-btn active" onclick="setMood('gold', this)" style="background: var(--autumn-gold);"></div>
            <div class="mood-btn" onclick="setMood('pink', this)" style="background: var(--love-pink);"></div>
            <div class="mood-btn" onclick="setMood('blue', this)" style="background: var(--tired-blue);"></div>
        </div>

        <div class="controls">
            <input type="text" id="authorName" class="author-input" value="林间">
            <div style="display:flex; align-items:center; gap:10px;">
                <label style="font-size:0.8rem; color:#8da399; cursor:pointer;"><input type="checkbox" id="capsuleCheck"> 时光胶囊</label>
                <button id="publishBtn" onclick="publishEntry()">发布日志</button>
            </div>
        </div>
    </div>

    <div id="diary-list"></div>

    <div id="customModal">
        <div class="modal-content">
            <p>要把这段记忆抹去吗？</p >
            <div class="modal-btns">
                <button onclick="closeModal()" style="background:transparent; color:white; border:1px solid #555; padding:8px 20px; border-radius:20px; cursor:pointer;">取消</button>
                <button id="modalConfirmBtn" style="background:var(--autumn-gold); color:#1c2b23; border:none; padding:8px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">确定</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hhsonthokjwhpcgbpnru.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhoc29udGhva2p3aHBjZ2JwbnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTUwNjQsImV4cCI6MjA5MTgzMTA2NH0.bf96o-eDXFSrOeHqTmnNSQZqDIDG7cjq1zciX7PNDQc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentMood = 'gold';
        const moodColors = { gold: '#ffb347', pink: '#ff85a1', blue: '#70a1ff' };
        let editingId = null;

        // 音乐控制逻辑
        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('musicToggle');
            if (music.paused) {
                music.play();
                btn.classList.add('playing');
                btn.innerText = '💿';
            } else {
                music.pause();
                btn.classList.remove('playing');
                btn.innerText = '🎵';
            }
        }

        function checkPass(val) {
            if (val === '邱天' || val === '1314') {
                document.getElementById('passcodeOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('passcodeOverlay').style.display = 'none', 500);
                startSite();
            }
        }

        async function fetchDiaries() {
            const { data } = await supabaseClient.from('ForestLog').select('*').order('created_at', { ascending: false });
            if (data) {
                const now = new Date();
                const filtered = data.filter(item => !item.is_capsule || (now - new Date(item.created_at)) > 86400000);
                document.getElementById('diary-list').innerHTML = filtered.map(item => `
                    <div class="diary-item" style="border-left: 5px solid ${moodColors[item.mood] || moodColors.gold}">
                        <div class="diary-header">
                            <div class="diary-time"><span class="author-tag">${item.author}</span>${new Date(item.created_at).toLocaleString()}</div>
                            <div class="actions">
                                <button class="action-btn" onclick="startEdit('${item.id}', \`${item.content}\`, '${item.author}')">✎</button>
                                <button class="action-btn" onclick="openDeleteModal('${item.id}')">✕</button>
                            </div>
                        </div>
                        <div style="line-height:1.8; white-space:pre-wrap;">${item.content}</div>
                    </div>
                `).join('');
            }
        }

        async function publishEntry() {
            const content = document.getElementById('diaryInput').value.trim();
            const author = document.getElementById('authorName').value || '林间';
            if (!content) return;
            
            if (editingId) {
                await supabaseClient.from('ForestLog').update({ content, author, mood: currentMood }).eq('id', editingId);
                editingId = null;
                document.getElementById('publishBtn').innerText = '发布日志';
            } else {
                await supabaseClient.from('ForestLog').insert([{ 
                    content, author, mood: currentMood, is_capsule: document.getElementById('capsuleCheck').checked 
                }]);
            }
            document.getElementById('diaryInput').value = '';
            document.getElementById('capsuleCheck').checked = false;
        }

        function setMood(mood, btn) {
            currentMood = mood;
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function openDeleteModal(id) {
            document.getElementById('customModal').style.display = 'flex';
            document.getElementById('modalConfirmBtn').onclick = async () => {
                await supabaseClient.from('ForestLog').delete().eq('id', id);
                closeModal();
            };
        }
        function closeModal() { document.getElementById('customModal').style.display = 'none'; }
        
        function startEdit(id, content, author) {
            editingId = id;
            document.getElementById('diaryInput').value = content;
            document.getElementById('authorName').value = author;
            document.getElementById('publishBtn').innerText = '保存修改';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function createHeart() {
            const heart = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            heart.setAttribute("viewBox", "0 0 24 24");
            heart.setAttribute("class", "heart");
            const size = Math.random() * 20 + 30;
            heart.style.width = size + "px";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 4 + 6) + "s";
            heart.style.fill = moodColors[currentMood];
            heart.innerHTML = `<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>`;
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => heart.remove(), 15000);
        }

        function startSite() {
            setInterval(createHeart, 300);
            fetchDiaries();
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'ForestLog' }, fetchDiaries).subscribe();
        }
    </script>
</body>
</html>
