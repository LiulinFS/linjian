<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林间的邱天</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --forest-bg: #1c2b23;
            --forest-dark: #064e3b; /* 墨绿色 */
            --forest-text: #8da399;
            --autumn-gold: #fbbf24; /* 更亮的金黄 */
            --autumn-glow: rgba(251, 191, 36, 0.4);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; background-color: var(--forest-bg); color: white;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 40px 20px; overflow-x: hidden;
        }

        /* 树叶容器 */
        #leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .leaf { position: absolute; fill: var(--autumn-gold); filter: drop-shadow(0 0 8px var(--autumn-glow)); animation: fall linear infinite; }

        header {
            text-align: center; margin-bottom: 6vh; margin-top: 5vh; z-index: 1;
        }

        /* 墨绿色标题 */
        .forest-text { 
            font-size: 1.8rem; 
            color: var(--forest-dark);
            letter-spacing: 2px; margin-bottom: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.05);
        }

        .autumn-text { 
            font-size: 2.3rem; color: var(--autumn-gold); font-weight: bold; 
            letter-spacing: 4px; text-shadow: 0 0 20px var(--autumn-glow);
        }

        /* 输入区 */
        .input-section {
            width: 100%; max-width: 500px; background: var(--card-bg);
            padding: 25px; border-radius: 24px; margin-bottom: 40px;
            border: 1px solid var(--card-border); z-index: 1;
            backdrop-filter: blur(12px); box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        textarea {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 1.1rem; resize: none; outline: none; height: 90px;
        }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .author-input {
            background: rgba(255,255,255,0.08); border: 1px solid #333; color: #eee;
            border-radius: 12px; padding: 8px 15px; width: 100px; outline: none;
        }

        button#publishBtn {
            background: var(--autumn-gold); border: none; padding: 12px 30px;
            border-radius: 30px; cursor: pointer; font-weight: bold; color: #1c2b23;
            transition: 0.3s; box-shadow: 0 4px 15px var(--autumn-glow);
        }

        #diary-list { width: 100%; max-width: 500px; z-index: 1; }
        .diary-item {
            background: var(--card-bg); padding: 22px; border-radius: 20px;
            margin-bottom: 20px; border: 1px solid var(--card-border);
            border-left: 6px solid var(--autumn-gold); backdrop-filter: blur(6px);
            position: relative; animation: slideIn 0.5s ease-out;
        }

        /* 列表内文字颜色 */
        .diary-time { font-size: 0.85rem; color: var(--forest-text); margin-bottom: 8px; }
        .author-tag { color: var(--autumn-gold); font-weight: bold; margin-right: 12px; }
        .diary-content { line-height: 1.8; font-size: 1.1rem; }

        .actions { display: flex; gap: 15px; }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--forest-text); opacity: 0.6; }
        .action-btn:hover { color: var(--autumn-gold); opacity: 1; }

        /* 自定义确认框 */
        #customModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1c2b23; border: 1px solid var(--autumn-gold);
            padding: 35px; border-radius: 25px; text-align: center;
            width: 85%; max-width: 340px;
        }
        .modal-btns { display: flex; justify-content: center; gap: 20px; margin-top: 25px; }
        .confirm-btn { background: var(--autumn-gold); color: #1c2b23; padding: 10px 30px; border-radius: 20px; border:none; font-weight:bold; cursor:pointer;}
        .cancel-btn { background: transparent; color: white; border: 1px solid #555; padding: 10px 30px; border-radius: 20px; cursor:pointer;}

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
            20% { opacity: 0.7; }
            100% { transform: translateY(110vh) rotate(720deg) scale(1.2); opacity: 0; }
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="leaf-container"></div>

    <header>
        <div class="forest-text">虽然森林很大，有时候容易迷路</div>
        <div class="autumn-text">但秋天总会如约而至。</div>
    </header>

    <div class="input-section">
        <textarea id="diaryInput" placeholder="存入林间的小秘密..."></textarea>
        <div class="controls">
            <input type="text" id="authorName" class="author-input" value="林间">
            <button id="publishBtn" onclick="publishEntry()">发布日志</button>
        </div>
    </div>

    <div id="diary-list"></div>

    <div id="customModal">
        <div class="modal-content">
            <p style="font-size: 1.2rem;">要把这段林间记忆抹去吗？</p >
            <div class="modal-btns">
                <button class="cancel-btn" onclick="closeModal()">取消</button>
                <button class="confirm-btn" id="modalConfirmBtn">确定</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hhsonthokjwhpcgbpnru.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhoc29udGhva2p3aHBjZ2JwbnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTUwNjQsImV4cCI6MjA5MTgzMTA2NH0.bf96o-eDXFSrOeHqTmnNSQZqDIDG7cjq1zciX7PNDQc';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let editingId = null;
        let deleteTargetId = null;

        async function fetchDiaries() {
            const { data } = await supabaseClient.from('ForestLog').select('*').order('created_at', { ascending: false });
            if (data) render(data);
        }

        function render(data) {
            document.getElementById('diary-list').innerHTML = data.map(item => `
                <div class="diary-item">
                    <div class="diary-header">
                        <div class="diary-time"><span class="author-tag">${item.author}</span>${new Date(item.created_at).toLocaleString()}</div>
                        <div class="actions">
                            <button class="action-btn" onclick="startEdit('${item.id}', \`${item.content}\`)">✎</button>
                            <button class="action-btn" onclick="openDeleteModal('${item.id}')">✕</button>
                        </div>
                    </div>
                    <div class="diary-content">${item.content}</div>
                </div>
            `).join('');
        }

        async function publishEntry() {
            const content = document.getElementById('diaryInput').value.trim();
            const author = document.getElementById('authorName').value;
            if (!content) return;

            if (editingId) {
                await supabaseClient.from('ForestLog').update({ content, author }).eq('id', editingId);
                editingId = null;
                document.getElementById('publishBtn').innerText = '发布日志';
            } else {
                await supabaseClient.from('ForestLog').insert([{ content, author }]);
            }
            document.getElementById('diaryInput').value = '';
            fetchDiaries();
        }

        function openDeleteModal(id) {
            deleteTargetId = id;
            document.getElementById('customModal').style.display = 'flex';
            document.getElementById('modalConfirmBtn').onclick = async () => {
                await supabaseClient.from('ForestLog').delete().eq('id', deleteTargetId);
                closeModal();
                fetchDiaries();
            };
        }

        function closeModal() { document.getElementById('customModal').style.display = 'none'; }

        function startEdit(id, content) {
            editingId = id;
            document.getElementById('diaryInput').value = content;
            document.getElementById('publishBtn').innerText = '保存修改';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 大号、高密度、黄金树叶系统
        function createLeaf() {
            const leaf = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            leaf.setAttribute("viewBox", "0 0 24 24");
            leaf.setAttribute("class", "leaf");
            
            // 树叶大小：大幅增加 (40px - 70px)
            const size = Math.random() * 30 + 40;
            leaf.style.width = size + "px";
            leaf.style.left = Math.random() * 100 + "vw";
            leaf.style.animationDuration = (Math.random() * 4 + 8) + "s";
            leaf.style.opacity = Math.random() * 0.4 + 0.3;

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            // 饱满的树叶路径
            path.setAttribute("d", "M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8.12,20C11,20 19,14 19,8C19,5.17 17,2 12,2C7,2 5,5 5,8C5,9.58 5.44,11.19 6.21,12.79C7.27,14.94 9.06,16.69 11,18.17C11.5,18.5 12,19 12.5,19.5L14.5,17.5C15.3,16.5 16.2,15.5 17,14.5V8Z");
            
            leaf.appendChild(path);
            document.getElementById('leaf-container').appendChild(leaf);
            setTimeout(() => leaf.remove(), 12000);
        }
        // 密度加大：每0.4秒生成一片
        setInterval(createLeaf, 400);

        supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'ForestLog' }, fetchDiaries).subscribe();
        fetchDiaries();
    </script>
</body>
</html>
