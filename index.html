<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林间的邱天</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --forest-bg: #1c2b23;
            --forest-dark: #8ED973; 
            --forest-text: #8da399;
            --autumn-gold: #ffb347;
            --love-pink: #ff85a1;
            --tired-blue: #70a1ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; background-color: var(--forest-bg); color: white;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 0 20px; overflow-x: hidden;
        }

        /* 🎵 音乐按钮 */
        #musicToggle {
            position: fixed; top: 20px; right: 20px; z-index: 1100;
            cursor: pointer; font-size: 1.6rem; opacity: 0.8; transition: 0.3s;
            filter: drop-shadow(0 0 5px var(--autumn-gold));
        }
        #musicToggle.playing { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        /* 暗号遮罩 */
        #passcodeOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--forest-bg); z-index: 2000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        #enterBtn {
            margin-top: 25px; padding: 10px 40px; 
            background: var(--autumn-gold); border: none; color: #1c2b23; 
            border-radius: 25px; cursor: pointer; font-size: 1rem; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,179,71,0.3);
            opacity: 0; transform: translateY(10px); pointer-events: none; transition: 0.3s;
        }
        #enterBtn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }

        #heart-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .heart { position: absolute; filter: drop-shadow(0 0 8px rgba(255,179,71,0.4)); animation: fall linear infinite; }

        /* 标题区：增加顶部边距，解决“字在上面”的问题 */
        header { text-align: center; margin-top: 80px; margin-bottom: 40px; z-index: 1; }
        .forest-text { font-size: 1.6rem; color: var(--forest-dark); font-weight: bold; margin-bottom: 12px; }
        .autumn-text { font-size: 2.1rem; color: var(--autumn-gold); font-weight: bold; }

        .input-section {
            width: 100%; max-width: 500px; background: var(--card-bg);
            padding: 25px; border-radius: 20px; margin-bottom: 30px;
            border: 1px solid var(--card-border); z-index: 1; backdrop-filter: blur(10px);
        }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; resize: none; outline: none; height: 70px; }
        
        /* 精致小圆点 */
        .mood-selector { display: flex; gap: 12px; margin: 12px 0; }
        .mood-btn { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 1.5px solid transparent; transition: 0.3s; }
        .mood-btn.active { border-color: white; transform: scale(1.2); box-shadow: 0 0 8px white; }

        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .author-input { background: rgba(255,255,255,0.08); border: 1px solid #444; color: #eee; border-radius: 12px; padding: 6px 12px; width: 80px; font-size: 0.9rem; }
        button#publishBtn { background: var(--autumn-gold); border: none; padding: 10px 22px; border-radius: 25px; cursor: pointer; font-weight: bold; color: #1c2b23; }

        #diary-list { width: 100%; max-width: 500px; z-index: 1; padding-bottom: 50px; }
        .diary-item {
            background: var(--card-bg); padding: 20px; border-radius: 18px;
            margin-bottom: 20px; border: 1px solid var(--card-border);
            border-left: 5px solid var(--autumn-gold); backdrop-filter: blur(5px);
            position: relative;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* 📱 手机端专用适配 */
        @media (max-width: 600px) {
            header { margin-top: 100px; } /* 手机端再往下挪一点 */
            .forest-text { font-size: 1.2rem; }
            .autumn-text { font-size: 1.6rem; }
            .input-section, #diary-list { width: 92%; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="musicToggle" onclick="toggleMusic()">🎵</div>
    <audio id="bgMusic" loop preload="auto" muted>
        <source src="./Love.mp3" type="audio/mpeg">
    </audio>

    <div id="passcodeOverlay">
        <p style="color: #8da399; margin-bottom: 15px;">输入暗号进入林间</p >
        <input type="password" id="passInput" placeholder="请输入..." style="background:transparent; border:none; border-bottom:1px solid #ffb347; color:white; text-align:center; outline:none; font-size:1.2rem;" oninput="validatePass(this.value)">
        <button id="enterBtn" onclick="grantAccess()">开启森林</button>
    </div>

    <div id="heart-container"></div>

    <header>
        <div class="forest-text">虽然森林很大 有时候容易迷路</div>
        <div class="autumn-text">但秋天总会如约而至</div>
    </header>

    <div class="input-section">
        <textarea id="diaryInput" placeholder="存入此时此刻..."></textarea>
        <div class="mood-selector">
            <div class="mood-btn active" onclick="setMood('gold', this)" style="background: var(--autumn-gold);"></div>
            <div class="mood-btn" onclick="setMood('pink', this)" style="background: var(--love-pink);"></div>
            <div class="mood-btn" onclick="setMood('blue', this)" style="background: var(--tired-blue);"></div>
        </div>
        <div class="controls">
            <input type="text" id="authorName" class="author-input" value="林间">
            <div style="display:flex; align-items:center; gap:10px;">
                <label style="font-size:0.8rem; color:#8da399; cursor:pointer;"><input type="checkbox" id="capsuleCheck"> 时光胶囊</label>
                <button id="publishBtn" onclick="publishEntry()">发布日志</button>
            </div>
        </div>
    </div>

    <div id="diary-list"></div>

    <script>
        const SUPABASE_URL = 'https://hhsonthokjwhpcgbpnru.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhoc29udGhva2p3aHBjZ2JwbnJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTUwNjQsImV4cCI6MjA5MTgzMTA2NH0.bf96o-eDXFSrOeHqTmnNSQZqDIDG7cjq1zciX7PNDQc';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentMood = 'gold';
        const moodColors = { gold: '#ffb347', pink: '#ff85a1', blue: '#70a1ff' };

        // 预载尝试
        window.onload = () => {
            const music = document.getElementById('bgMusic');
            music.play().catch(() => console.log("等待手势"));
        };

        function validatePass(val) {
            const btn = document.getElementById('enterBtn');
            if (val === '邱天' || val === '1314') {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        }

        // 开启森林 + 强制开嗓
        function grantAccess() {
            const music = document.getElementById('bgMusic');
            const toggle = document.getElementById('musicToggle');
            const overlay = document.getElementById('passcodeOverlay');

            music.muted = false; // 关键：解除静音
            music.volume = 1.0;
            music.play().then(() => {
                toggle.classList.add('playing');
            }).catch(e => console.error("播放受阻", e));

            overlay.style.opacity = '0';
            overlay.style.transform = 'scale(1.1)';
            setTimeout(() => {
                overlay.style.display = 'none';
                startSite();
            }, 1000);
        }

        function toggleMusic() {
            const music = document.getElementById('bgMusic');
            const btn = document.getElementById('musicToggle');
            music.muted = false;
            if (music.paused) {
                music.play().then(() => btn.classList.add('playing'));
            } else {
                music.pause();
                btn.classList.remove('playing');
            }
        }

        async function fetchDiaries() {
            const { data } = await supabaseClient.from('ForestLog').select('*').order('created_at', { ascending: false });
            if (data) {
                const now = new Date();
                const filtered = data.filter(item => !item.is_capsule || (now - new Date(item.created_at)) > 86400000);
                document.getElementById('diary-list').innerHTML = filtered.map(item => `
                    <div class="diary-item" style="border-left: 5px solid ${moodColors[item.mood] || moodColors.gold}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <div style="font-size:0.8rem; color:#8da399"><span style="color:#ffb347; font-weight:bold; margin-right:8px;">${item.author}</span>${new Date(item.created_at).toLocaleString()}</div>
                            <button onclick="deleteEntry('${item.id}')" style="background:none; border:none; color:#8da399; cursor:pointer; opacity:0.5;">✕</button>
                        </div>
                        <div style="line-height:1.8; white-space:pre-wrap;">${item.content}</div>
                    </div>
                `).join('');
            }
        }

        async function publishEntry() {
            const content = document.getElementById('diaryInput').value.trim();
            const author = document.getElementById('authorName').value || '林间';
            if (!content) return;
            await supabaseClient.from('ForestLog').insert([{ content, author, mood: currentMood, is_capsule: document.getElementById('capsuleCheck').checked }]);
            document.getElementById('diaryInput').value = '';
            fetchDiaries();
        }

        function setMood(mood, btn) {
            currentMood = mood;
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function deleteEntry(id) {
            await supabaseClient.from('ForestLog').delete().eq('id', id);
            fetchDiaries();
        }

        function createHeart() {
            const heart = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            heart.setAttribute("viewBox", "0 0 24 24");
            heart.setAttribute("class", "heart");
            const size = Math.random() * 20 + 30;
            heart.style.width = size + "px";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 4 + 6) + "s";
            heart.style.fill = moodColors[currentMood];
            heart.innerHTML = `<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>`;
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => heart.remove(), 15000);
        }

        function startSite() {
            setInterval(createHeart, 300);
            fetchDiaries();
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'ForestLog' }, fetchDiaries).subscribe();
        }
    </script>
</body>
</html>
